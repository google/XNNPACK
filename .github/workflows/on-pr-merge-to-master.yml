name: Build and update caches
on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'docker/**'
  workflow_dispatch:

permissions:
  contents: read   # checkout in the called workflow
  actions: write   # cache restore + save in the called workflow (actions/cache@v5)

jobs:
  build-and-test:
    uses: ./.github/workflows/build.yml
    with:
      run-tests: false
      update-caches: true
